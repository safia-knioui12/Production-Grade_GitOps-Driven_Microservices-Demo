    repo: https://github.com/safia-knioui12/Production-Grade_GitOps-Driven_Microservices-Demo/helm-chart
    version: 0.10.4
    releaseName: boutique-app
    namespace: boutique-app
    valuesFile: helm-chart/values.yaml
